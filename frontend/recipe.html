<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Торт Цветок - Tasteory</title>
    <link rel="stylesheet" href="recipe.css">
    <link rel="stylesheet" href="Lightbox/lightbox.css">
    <script src="recipe.js" defer></script>
    <script src="Lightbox/lightbox.js" defer></script>

</head>
<body>
<!-- Окно для просмотра фото -->
<div id="lightbox" class="lightbox">
    <span class="close-lightbox">&times;</span>

    <button class="lightbox-prev">&#10094;</button>
    <button class="lightbox-next">&#10095;</button>
    <div class="lightbox-content">
        <img id="lightbox-img" src="" alt="">
        <div id="lightbox-caption"></div>
    </div>
</div>
<!-- Верхушка айзберга-->
<header class="main-header">
    <div class="container">
        <div class="logo">Tasteory</div>
    </div>
</header>
<!--Склон айзберга-->
<main class="container">
    <article class="recipe">
        <h1 class="recipe-title"></h1>

        <div class="recipe-description">
            <p id="recipe-text"></p>
        </div>

        <div class="recipe-main-grid">
            <!-- Левая колонка: Изображение и метрики -->
            <div class="recipe-visual">
                <div class="image-wrapper">
                    <img id="recipe-img" src="" alt="">
                </div>

                <div class="metrics">
                    <div class="author">Автор: <span id="author-name"></span></div>
                    <!-- Кнопка лайка -->
                    <div class="stats">
                        <span class="stat-item" id="like-button">
                            <img id="like-icon" src="" alt="Лайк" width="18">
                            <span id="like-count"></span>
                        </span>
                                    <span class="stat-item">
                            <img id="view-icon" src="" alt="Просмотры" width="18">
                            <span id="view-count"></span>
                        </span>
                    </div>
                </div>
            </div>
            <!-- Правая колонка: Ингредиенты -->
            <div class="ingredients-section">
                <div class="ingredients-header">
                    <h2>СОСТАВ / ИНГРЕДИЕНТЫ</h2>
                    <div class="servings-control">
                        <label for="yield_num_input">Порций:</label>
                        <div class="input-group">
                            <input id="yield_num_input" type="number" value="7">
                            <div class="spin-buttons">
                                <button class="plus">+</button>
                                <button class="minus">−</button>
                            </div>
                        </div>
                    </div>
                </div>
                <ul class="ingredients-list">
                    <!-- Сдесь всё автоматом -->
                </ul>
            </div>
        </div>
    </article>
</main>
<!--Глубокая пещера (footer)-->
</body>
</html>
