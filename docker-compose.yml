services:
  postgres:
    image: postgres:16-alpine
    container_name: tasteory_db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 2s
      timeout: 3s
      retries: 10

  backend:
    build:
      context: ./Tasteory
      dockerfile: Dockerfile
    container_name: tasteory_api
    restart: always
    ports:
      - "${ASPNETCORE_HTTP_PORT}:8080"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__DefaultConnection: "Host=postgres;Port=5432;Database=${POSTGRES_DB};Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}"
      JwtOptions__SecretKey: ${JWT_SECRET}
      JwtOptions__Issuer: ${JWT_ISSUER}
      JwtOptions__Audience: ${JWT_AUDIENCE}
      JwtOptions__ExpiresHours: 24
      YANDEXS3__BUCKETNAME: ${YANDEXS3__BUCKETNAME}
      YANDEXS3__ACCESSKEY: ${YANDEXS3__ACCESSKEY}
      YANDEXS3__SECRETKEY: ${YANDEXS3__SECRETKEY}
      YANDEXS3__ENDPOINT: ${YANDEXS3__ENDPOINT}
      YANDEXS3__USEPUBLICURLS: ${YANDEXS3__USEPUBLICURLS}
      YANDEXS3__MEDIAPREFIX: ${YANDEXS3__MEDIAPREFIX}

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: tasteory_web
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - backend
    volumes:
      - ./frontend:/usr/share/nginx/html
      - ./frontend/nginx.conf:/etc/nginx/conf.d/default.conf
      - /etc/letsencrypt:/etc/letsencrypt:ro
    restart: always

  loki:
    image: grafana/loki:latest
    container_name: tasteory_loki
    ports:
      - "3101:3100"
    volumes:
      - ./loki-config.yaml:/etc/loki/local-config.yaml
      - loki_data:/loki
    command: -config.file=/etc/loki/local-config.yaml
    restart: always

  prometheus:
    image: prom/prometheus:latest
    container_name: tasteory_prometheus
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
    ports:
      - "9090:9090"

  grafana:
    image: grafana/grafana:latest
    container_name: tasteory_grafana
    ports:
      - "3100:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_FEATURE_TOGGLES_ENABLE=dashboardScene,nestedPanels
      - GF_SERVER_ROOT_URL=http://81.26.191.43:3100/
      - GF_SERVER_SERVE_FROM_SUB_PATH=false
    depends_on:
      - prometheus
      - loki
    restart: always
volumes:
  prometheus_data:
  grafana_data:
  pgdata:
  loki_data: