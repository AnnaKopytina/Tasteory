services:
  backend:
    build:
      context: ./Tastory
      dockerfile: Dockerfile
    container_name: tasteory_api
    restart: always

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: tasteory_web
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: always