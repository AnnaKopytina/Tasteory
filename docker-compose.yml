services:
  postgres:
    image: postgres:16-alpine
    container_name: tasteory_db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 2s
      timeout: 3s
      retries: 10

  backend:
    build:
      context: ./Tasteory
      dockerfile: Dockerfile
    container_name: tasteory_api
    restart: always
    ports:
      - "${ASPNETCORE_HTTP_PORT}:8080"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__DefaultConnection: "Host=postgres;Port=5432;Database=${POSTGRES_DB};Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}"
      JwtOptions__SecretKey: ${JWT_SECRET}
      JwtOptions__Issuer: ${JWT_ISSUER}
      JwtOptions__Audience: ${JWT_AUDIENCE}
      JwtOptions__ExpiresHours: 24

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: tasteory_web
    ports:
      - "${FRONTEND_PORT}:80"
    depends_on:
      - backend
    restart: always

volumes:
  pgdata: