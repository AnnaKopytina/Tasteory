services:
  frontend:
    ports:
      - "80:80"
    volumes:
      - ./frontend:/usr/share/nginx/html
      - ./frontend/nginx.dev.conf:/etc/nginx/conf.d/default.conf
      - ./letsencrypt:/etc/letsencrypt:ro

  grafana:
    environment:
      - GF_SERVER_ROOT_URL=http://localhost:3100/
      - GF_SERVER_SERVE_FROM_SUB_PATH=false